<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#2B2B2B"/>
  
  <!-- Outer Circle -->
  <circle cx="512" cy="512" r="480" fill="none" stroke="#B2D2B2" stroke-width="12"/>
  
  <!-- Geometric Owl Head -->
  <g transform="translate(312, 200) scale(1.0)" stroke="#B2D2B2" stroke-width="12" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Brow/Ears -->
    <path d="M 0 100 L 100 0 L 200 100 L 300 0 L 400 100" />
    <path d="M 100 0 L 200 100 L 300 0" />
    
    <!-- Eyes (Hexagons) -->
    <!-- Left Eye -->
    <path d="M 20 180 L 80 130 L 160 130 L 180 180 L 160 230 L 80 230 Z" />
    <polygon points="90,180 110,165 130,180 130,200 110,215 90,200" fill="#B2D2B2" stroke="none"/>
    
    <!-- Right Eye -->
    <path d="M 380 180 L 320 130 L 240 130 L 220 180 L 240 230 L 320 230 Z" />
    <polygon points="270,180 290,165 310,180 310,200 290,215 270,200" fill="#B2D2B2" stroke="none"/>
    
    <!-- Beak -->
    <path d="M 180 220 L 200 280 L 220 220" />
    
    <!-- Face Outline Connectors -->
    <path d="M 20 180 L 0 100" />
    <path d="M 380 180 L 400 100" />
    <path d="M 180 180 L 200 240 L 220 180" />
  </g>

  <!-- ETG Text (Stencil Style) -->
  <g transform="translate(312, 550)" fill="#B2D2B2">
    <!-- E -->
    <path d="M 0 0 H 120 V 30 H 40 V 60 H 110 V 90 H 40 V 120 H 120 V 150 H 0 Z" />
    <!-- T -->
    <path d="M 140 0 H 260 V 30 H 215 V 150 H 185 V 30 H 140 Z" />
    <!-- G -->
    <path d="M 280 0 H 400 V 30 H 320 V 120 H 370 V 80 H 340 V 50 H 400 V 150 H 280 Z" />
  </g>
</svg>
