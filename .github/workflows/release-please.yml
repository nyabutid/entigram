name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Standard release type for Python projects
          release-type: python
          # Use a PAT so the resulting tag creation triggers the Publish workflow, fallback to default if not set
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -r requirements.txt

      - name: Bootstrap Entigram
        run: make bootstrap

      - name: Run Tests
        run: make test

      - name: Set release version
        run: |
          TAG_NAME="${{ needs.release-please.outputs.tag_name }}"
          VERSION=${TAG_NAME#v}

          python scripts/versioning.py validate "$VERSION"
          python scripts/versioning.py set "$VERSION"
          echo "ENTIGRAM_RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Update Homebrew Tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${ENTIGRAM_RELEASE_VERSION}"
          
          echo "Releasing version: $VERSION"

          # Calculate the SHA256 of the source distribution
          SDIST_PATH=$(ls dist/entigram_ai-${VERSION}.tar.gz dist/entigram-ai-${VERSION}.tar.gz 2>/dev/null | head -n 1)
          if [ -z "$SDIST_PATH" ]; then
            echo "No source distribution found for version $VERSION"
            exit 1
          fi
          SHA256=$(sha256sum $SDIST_PATH | awk '{ print $1 }')
          echo "SHA256: $SHA256"

          # Clone and update Homebrew tap
          git clone https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/nyabutid/homebrew-entigram.git
          cd homebrew-entigram
          FORMULA=$(find Formula -maxdepth 1 -type f -name '*.rb' | sort | head -n 1)
          if [ -z "$FORMULA" ]; then
            echo "No Entigram formula found under Formula/."
            find Formula -maxdepth 2 -type f -name '*.rb' | sort
            exit 1
          fi
          echo "Updating formula: $FORMULA"
          sed -i "s/entigram[-_]ai-[^/[:space:]]*\.tar\.gz/$(basename "$SDIST_PATH")/g" $FORMULA
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/g" $FORMULA
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add $FORMULA
          git commit -m "chore: bump etg to ${VERSION}"
          git push origin main
