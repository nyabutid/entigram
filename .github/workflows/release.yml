name: Publish and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.4.0)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.0.1 or 1.100.100)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for automatic release notes to see history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -r requirements.txt

      - name: Bootstrap Entigram
        run: make bootstrap

      - name: Run Tests
        run: make test

      - name: Set release version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi

          python scripts/versioning.py validate "$VERSION"
          python scripts/versioning.py set "$VERSION"
          echo "ENTIGRAM_RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.ENTIGRAM_RELEASE_VERSION }}
          name: Release v${{ env.ENTIGRAM_RELEASE_VERSION }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${ENTIGRAM_RELEASE_VERSION}"
          
          echo "Releasing version: $VERSION"

          # Calculate the SHA256 of the source distribution
          SDIST_PATH=$(ls dist/entigram_ai-${VERSION}.tar.gz dist/entigram-ai-${VERSION}.tar.gz 2>/dev/null | head -n 1)
          if [ -z "$SDIST_PATH" ]; then
            echo "No source distribution found for version $VERSION"
            exit 1
          fi
          SHA256=$(sha256sum $SDIST_PATH | awk '{ print $1 }')
          echo "SHA256: $SHA256"

          # Clone and update Homebrew tap
          git clone https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/nyabutid/homebrew-entigram.git
          cd homebrew-entigram
          FORMULA=$(find Formula -maxdepth 1 -type f -name '*entigram*.rb' | sort | head -n 1)
          if [ -z "$FORMULA" ]; then
            echo "No Entigram formula found under Formula/."
            find Formula -maxdepth 2 -type f -name '*.rb' | sort
            exit 1
          fi
          echo "Updating formula: $FORMULA"
          sed -i "s/entigram[-_]ai-[^/[:space:]]*\.tar\.gz/$(basename "$SDIST_PATH")/g" $FORMULA
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/g" $FORMULA
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add $FORMULA
          git commit -m "chore: bump etg to ${VERSION}"
          git push origin main
